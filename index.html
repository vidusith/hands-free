<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apple Store 2026</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background-color: #f5f5f7; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        
        .header-logo { height: 80px; margin-bottom: 20px; }

        #product-toggle { display: none; }

        .reveal-btn {
            display: inline-block;
            background: #000;
            color: white;
            padding: 15px 35px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            margin-bottom: 30px;
            transition: transform 0.2s;
            user-select: none;
        }

        .reveal-btn:hover { transform: scale(1.05); }

        .product-grid {
            display: none; 
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
      
        #product-toggle:checked ~ .product-grid {
            display: flex;
        }

        #product-toggle:checked ~ .reveal-btn::after {
            content: " (Close Gallery)";
        }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            width: 260px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }
        
        .card img { width: 100%; height: 160px; object-fit: contain; border-radius: 10px; }
        h3 { margin: 15px 0 5px; font-size: 1.4rem; }
        .specs { color: #0071e3; font-size: 0.9rem; margin-bottom: 10px; }
        .price { color: #86868b; font-weight: bold; }
    </style>
</head>
<body>

    <img src="logo.jpg.webp" alt="Hand Logo" class="header-logo">
    <br>

    <input type="checkbox" id="product-toggle">
    <label for="product-toggle" class="reveal-btn">Explore the 2026 Collection</label>

    <div class="product-grid">
        <!-- MacBook Pro 2026 -->
        <div class="card">
            <img src="mac.jpg" alt="MacBook Pro 2026">
            <h3>MacBook Pro</h3>
            <p class="specs">M5 Ultra Chipset</p>
            <p class="price">From $1999</p>
        </div>
       
        <div class="card">
            <img src="iphone.jpg" alt="iPhone 17 Ultra">
            <h3>iPhone 17 Ultra</h3>
            <p class="specs">Titanium Orange Edition</p>
            <p class="price">From $1199</p>
        </div>
        
        <div class="card">
            <img src="ipad.jpg" alt="iPad Fold">
            <h3>iPad Fold</h3>
            <p class="specs">Infinite Liquid Retina</p>
            <p class="price">From $1499</p>
        </div>
    </div>

</body>
</html>
